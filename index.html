<div class="df-root">

  <div class="df-masthead">
    <div class="df-logo">Deepfake Record</div>
    <div class="df-live-pill">
      <div class="df-live-dot"></div>
      Live feed
    </div>

  <div class="df-hero">
    <div>
      <div class="df-hero-kicker">A living archive of synthetic media</div>
      <h1 class="df-hero-headline">Everything you see<br><em>is a deepfake.</em></h1>
    </div>

    <div class="df-counter-block">
      <div class="df-counter-num" id="counter">0</div>

    </div>
    <button class="df-filter-btn active" onclick="filterCards('all', this)">All</button>
    <button class="df-filter-btn" onclick="filterCards('political', this)">Political</button>

<script>
const fallbackCards = [
  { type:'political', badge:'df-badge-political', label:'Political', title:'World leader fabricated in manufactured crisis video', platform:'Telegram', ratio:'4/3', isNew:true, color:'#f5f0ea', imageUrl:'' },
  { type:'celeb', badge:'df-badge-celeb', label:'Celebrity', title:'Actress placed in fabricated advertisement without consent', platform:'Instagram', ratio:'3/4', isNew:false, color:'#eaeef5', imageUrl:'' },
  { type:'fraud', badge:'df-badge-fraud', label:'Fraud', title:'CEO voice clone used to authorise high-value wire transfer', platform:'Phone call', ratio:'1/1', isNew:true, color:'#faeaea', imageUrl:'' },
  { type:'synthetic', badge:'df-badge-synthetic', label:'Synthetic image', title:'Manufactured protest image spread ahead of election', platform:'X', ratio:'16/9', isNew:false, color:'#eaf4ee', imageUrl:'' },
  { type:'audio', badge:'df-badge-audio', label:'Voice clone', title:'Synthetic audio of politician falsely announcing resignation', platform:'WhatsApp', ratio:'1/1', isNew:true, color:'#f5eaf8', imageUrl:'' }
];

let liveCards = [...fallbackCards];
let verifiedCards = [];
let contextArticles = [];
let tickerItems = [
  'Live synthetic media tracker',
  'Status: reported as synthetic, auto-classified',
  'No manual approval queue',
  'GDELT refresh every 15 minutes',
  'Free pipeline mode enabled',
  'Live synthetic media tracker',
  'Status: reported as synthetic, auto-classified',
  'No manual approval queue'
];

let counter = 2847;
let scannedCounter = 2847;
let filter = 'all';
let mode = 'live';
let liveTotal = 0;
let verifiedTotal = 0;

const typeToCardBadge = {
  political: 'df-badge-political',
  fraud: 'df-badge-fraud',
  celeb: 'df-badge-celeb',
  synthetic: 'df-badge-synthetic',
  audio: 'df-badge-audio',
};

const typeToLabel = {
  political: 'Political',
  fraud: 'Fraud',
  celeb: 'Celebrity',
  synthetic: 'Synthetic image',
  audio: 'Voice clone',
};

const typeToColor = {
  political: '#f5f0ea',
  fraud: '#faeaea',
  celeb: '#eaeef5',
  synthetic: '#eaf4ee',
  audio: '#f5eaf8',
};

function safeText(v) {
  return (v || '').replace(/[&<>"]/g, (m) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[m]));
}

function agoText(iso) {
  if (!iso) return 'unknown time';
  const minutes = Math.max(1, Math.floor((Date.now() - new Date(iso).getTime()) / 60000));
  if (minutes < 60) return `${minutes}m ago`;
  const hours = Math.floor(minutes / 60);
  if (hours < 24) return `${hours}h ago`;
  const days = Math.floor(hours / 24);
  return `${days}d ago`;
}

function ratioFromType(type) {
  if (type === 'celeb') return '3/4';
  if (type === 'synthetic') return '16/9';
  if (type === 'political') return '4/3';
  return '1/1';
}

function imageHtml(url) {
  if (!url) return '<div style="font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#777;">No image available</div>';
  return `<img src="${safeText(url)}" alt="Incident image" loading="lazy" style="width:100%;height:100%;object-fit:cover;display:block;" onerror="this.replaceWith(Object.assign(document.createElement('div'),{textContent:'Image unavailable',style:'font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#777;'}));"/>`;
}

function filterCards(type, btn) {
  filter = type;
  document.querySelectorAll('.df-filters > .df-filter-btn').forEach((b) => b.classList.remove('active'));
  btn.classList.add('active');
  renderGallery();
}

function setMode(nextMode, btn) {
  mode = nextMode;
  document.querySelectorAll('.df-mode-switch .df-filter-btn').forEach((b) => b.classList.remove('active'));
  btn.classList.add('active');
  updateHeroCounters();
  renderGallery();
}

function getActiveCards() {
  if (mode === 'verified' && verifiedCards.length === 0) return liveCards;
  return mode === 'verified' ? verifiedCards : liveCards;
}

function renderGallery() {
  const cards = getActiveCards();
  const list = filter === 'all' ? cards : cards.filter((c) => c.type === filter);
  document.getElementById('gallery').innerHTML = list.map((c) => `
    <div class="df-card" data-url="${safeText(c.articleUrl || '')}">
      <div class="df-card-img" style="--ratio:${c.ratio};background:${c.color};">${imageHtml(c.imageUrl)}${c.isNew ? '<div class="df-new-tag">New</div>' : ''}</div>
      <div class="df-card-meta">
        <div class="df-card-type">${safeText(c.label)}</div>
        <div class="df-card-title">${safeText(c.title)}</div>
        <div class="df-card-platform">${safeText(c.platform)}</div>
        <div class="df-card-line">Source: ${safeText(c.source || 'GDELT feed')}</div>
        <div class="df-card-line">Reported by: ${safeText(c.source || 'GDELT feed')}</div>
        <div class="df-card-line">Detection confidence: ${Math.round((Number(c.confidence) || 0) * 100)}%</div>
        <div class="df-card-visual">Visual: ${safeText(c.imageLabel || 'Documented incident image')} · Rights: ${safeText(c.rightsLabel || 'Link-only')}</div>
        <div class="df-card-line">${safeText(c.usageNote || 'Status shown for editorial transparency.')}</div>
        <div class="df-card-status">Status: Reported as synthetic - not independently verified</div>
        <div class="df-card-badge ${c.badge}">${safeText(c.label)}</div>
      </div>
    </div>`).join('');
  attachCardClicks();
}

function attachCardClicks() {
  document.querySelectorAll('.df-card[data-url]').forEach((card) => {
    card.onclick = null;
    const url = card.getAttribute('data-url');
    if (!url) return;
    card.addEventListener('click', () => {
      window.open(url, '_blank', 'noopener,noreferrer');
    });
  });
}

function renderTicker() {
  document.getElementById('ticker').innerHTML = tickerItems.map((t) => `<span class="df-ticker-item">${safeText(t)}<span class="df-ticker-sep">·</span></span>`).join('');
}

function renderContext() {
  const list = contextArticles.slice(0, 9);
  const root = document.getElementById('contextList');
  root.innerHTML = list.map((a) => `
    <div class="df-context-item" data-url="${safeText(a.article_url || '')}">
      <div class="df-context-topic">${safeText(a.topic_label || 'Public Impact')}</div>
      <div class="df-context-title">${safeText(a.title || 'Untitled context article')}</div>
    </div>
  `).join('');

  document.querySelectorAll('.df-context-item[data-url]').forEach((item) => {
    const url = item.getAttribute('data-url');
    if (!url) return;
    item.addEventListener('click', () => window.open(url, '_blank', 'noopener,noreferrer'));
  });
}

function mapIncident(incident, index) {
  const type = incident.category || 'synthetic';
  const label = typeToLabel[type] || 'Synthetic image';
  const imageTypeMap = {
    documented: 'Documented incident image',
    illustrative: 'Illustrative synthetic image',
    redacted: 'Redacted visual',
  };
  const rightsMap = {
    licensed: 'Licensed',
    public_reporting_use: 'Public-reporting use',
    link_only: 'Link-only',
    unknown: 'Unknown',
  };
  return {
    type,
    badge: typeToCardBadge[type] || 'df-badge-synthetic',
    label,
    title: incident.title || 'Untitled incident',
    platform: `${incident.platform || incident.source_domain || 'Web'} · ${agoText(incident.published_at)}`,
    ratio: ratioFromType(type),
    isNew: index < 6,
    color: typeToColor[type] || '#eaf4ee',
    imageUrl: incident.image_url || '',
    articleUrl: incident.article_url || '',
    confidence: incident.confidence || 0.5,
    source: incident.source_domain || 'GDELT feed',
    imageLabel: imageTypeMap[incident.image_type] || 'Documented incident image',
    rightsLabel: rightsMap[incident.rights_status] || 'Unknown',
    usageNote: incident.usage_note || '',
    status: incident.status || 'reported_as_synthetic',
  };
}

async function loadLiveData() {
  try {
    const [incidentsReq, verifiedReq, contextReq, statsReq] = await Promise.allSettled([
      fetch('/api/incidents?limit=120'),
      fetch('/api/verified?limit=300'),
      fetch('/api/context?limit=24'),
      fetch('/api/stats'),
    ]);

    const incidentsPayload = incidentsReq.status === 'fulfilled' ? await incidentsReq.value.json() : { ok: false };
    const verifiedPayload = verifiedReq.status === 'fulfilled' ? await verifiedReq.value.json() : { ok: false };
    const contextPayload = contextReq.status === 'fulfilled' ? await contextReq.value.json() : { ok: false };
    const statsPayload = statsReq.status === 'fulfilled' ? await statsReq.value.json() : { ok: false };

    if (incidentsPayload.ok && Array.isArray(incidentsPayload.incidents) && incidentsPayload.incidents.length) {
      liveCards = incidentsPayload.incidents.map(mapIncident);
    }

    if (verifiedPayload.ok && Array.isArray(verifiedPayload.incidents) && verifiedPayload.incidents.length) {
      verifiedCards = verifiedPayload.incidents.map(mapIncident);
    }

    if (contextPayload.ok && Array.isArray(contextPayload.articles)) {
      contextArticles = contextPayload.articles;
    }

    if (statsPayload.ok) {
      liveTotal = statsPayload.live_total || statsPayload.total || liveCards.length || liveTotal;
      verifiedTotal = statsPayload.verified_total || verifiedCards.length || verifiedTotal;
      scannedCounter = statsPayload.scanned_total || scannedCounter;
      updateHeroCounters();

      tickerItems = [
        `${liveTotal.toLocaleString()} live incidents logged`,
        `${verifiedTotal.toLocaleString()} verified archive incidents`,
        `${scannedCounter.toLocaleString()} items scanned`,
        `Last incident: ${statsPayload.latest_minutes_ago ? `${statsPayload.latest_minutes_ago} minutes ago` : 'unknown'}`,
        `Top platform: ${statsPayload.top_platform || 'Unknown'}`,
        'Status: reported as synthetic',
        'Auto-categorized feed',
        `${liveTotal.toLocaleString()} live incidents logged`,
        `${verifiedTotal.toLocaleString()} verified archive incidents`,
        `${scannedCounter.toLocaleString()} items scanned`,
        `Top platform: ${statsPayload.top_platform || 'Unknown'}`,
        'No manual approval queue',
      ];
    }
  } catch (error) {
    tickerItems = [
      'Live connection unavailable',
      'Showing fallback dataset',
      'Check Supabase env keys',
      'Run /api/ingest to populate data',
      'Live connection unavailable',
      'Showing fallback dataset',
    ];
  }

  renderGallery();
  renderContext();
  renderTicker();
}

function updateHeroCounters() {
  const usingFallback = mode === 'verified' && verifiedTotal === 0;
  const value = mode === 'verified' && !usingFallback ? verifiedTotal : liveTotal;
  const label = mode === 'verified' && !usingFallback ? 'Verified archive' : 'Incidents logged';
  const counterEl = document.getElementById('counter');
  const labelEl = document.getElementById('counterLabel');
  if (counterEl) counterEl.textContent = (value || 0).toLocaleString();
  if (labelEl) labelEl.textContent = label;
}

renderGallery();
renderContext();
renderTicker();
setInterval(loadLiveData, 60000);
loadLiveData();
</script>
