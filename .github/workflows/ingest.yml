name: Ingest Deepfake Feed

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ingest endpoint
        env:
          INGEST_URL: ${{ secrets.INGEST_URL }}
        run: |
          if [ -z "$INGEST_URL" ]; then
            echo "Missing INGEST_URL secret"
            exit 1
          fi
          echo "Calling: $INGEST_URL"
          # Retry transient upstream/network failures (429/5xx/timeouts).
          # Keep body so we can inspect API errors in workflow logs.
          HTTP_CODE=$(curl -sS -L \
            --retry 4 \
            --retry-delay 5 \
            --retry-all-errors \
            --max-time 120 \
            -w "%{http_code}" \
            -o /tmp/ingest_response.json \
            "$INGEST_URL")
          cat /tmp/ingest_response.json || true
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Ingest endpoint returned HTTP $HTTP_CODE"
            exit 1
          fi
