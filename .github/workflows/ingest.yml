name: Ingest Deepfake Feed

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ingest endpoint
        env:
          INGEST_URL: ${{ secrets.INGEST_URL }}
        run: |
          if [ -z "$INGEST_URL" ]; then
            echo "Missing INGEST_URL secret"
            exit 1
          fi
          echo "Calling: $INGEST_URL"
          # Retry transient upstream/network failures (429/5xx/timeouts).
          # Keep body so we can inspect API errors in workflow logs.
          CURL_EXIT=0
          HTTP_CODE=$(curl -sS -L \
            --retry 4 \
            --retry-delay 5 \
            --retry-all-errors \
            --connect-timeout 20 \
            --max-time 1200 \
            -w "%{http_code}" \
            -o /tmp/ingest_response.json \
            "$INGEST_URL") || CURL_EXIT=$?
          cat /tmp/ingest_response.json || true
          # curl timeout (28) can still mean the ingest continued server-side.
          if [ "$CURL_EXIT" -eq 28 ]; then
            echo "Ingest request timed out in GitHub Actions (curl 28); not failing workflow."
            exit 0
          fi
          if [ "$CURL_EXIT" -ne 0 ]; then
            echo "curl failed with exit code $CURL_EXIT"
            exit $CURL_EXIT
          fi
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Ingest endpoint returned HTTP $HTTP_CODE"
            exit 1
          fi
